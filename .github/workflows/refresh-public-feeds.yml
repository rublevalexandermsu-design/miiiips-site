name: Refresh public feeds

on:
  workflow_dispatch:
  schedule:
    - cron: "25 5 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Refresh feeds
        run: python refresh_public_feeds.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/live-feeds.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh public feeds"
          git push
